<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GoalMetrics — International football analytics dashboard. Compare teams, explore tournament history, and track player goalscoring records.">
    <title>{% block title %}GoalMetrics{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="page-wrapper">

        <!-- ── Navbar ── -->
        <nav class="navbar" id="main-nav">
            <a href="/" class="navbar__brand">⚽ GoalMetrics</a>
            <ul class="navbar__links">
                <li><a href="/"        class="navbar__link {% block nav_home %}{% endblock %}">Home</a></li>
                <li><a href="/compare" class="navbar__link {% block nav_compare %}{% endblock %}">Compare</a></li>
                <li><a href="/team"    class="navbar__link {% block nav_team %}{% endblock %}">Teams</a></li>
                <li><a href="/player"  class="navbar__link {% block nav_player %}{% endblock %}">Players</a></li>
            </ul>
        </nav>

        <!-- ── Page Content ── -->
        {% block content %}{% endblock %}

        <!-- ── Footer ── -->
        <footer class="footer">
            <p>Built with Flask &amp; MySQL &mdash; <a href="https://github.com/Ahmad-Fareed/GoalMetrics" target="_blank" rel="noopener">GoalMetrics</a></p>
        </footer>

    </div>

    <!-- Toast container (notifications injected via JS) -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ── Shared JS utilities ── -->
    <script>
        /** Show a toast notification instead of alert(). */
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast--exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 3500);
        }
    </script>

    {% block scripts %}{% endblock %}

</body>
</html>
